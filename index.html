<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مغير الصوت الاحترافي</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f0f4f8;
            padding: 40px 15px;
            margin: 0;
        }
        .container {
            background: white;
            padding: 30px 20px;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            max-width: 400px;
            margin: 0 auto;
        }
        h2 { color: #1e293b; margin-bottom: 10px; }
        p { color: #64748b; font-size: 14px; margin-bottom: 30px; }
        button {
            color: white;
            border: none;
            padding: 16px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 14px;
            cursor: pointer;
            margin-bottom: 12px;
            width: 100%;
            transition: 0.2s;
        }
        #startBtn { background-color: #2563eb; }
        #stopBtn { background-color: #dc3545; }
        button:disabled { background-color: #cbd5e1; cursor: not-allowed; }
        .status {
            margin: 20px 0;
            font-weight: 600;
            color: #475569;
            padding: 10px;
            border-radius: 10px;
            background: #f8fafc;
        }
        audio { width: 100%; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2>تغيير الصوت الذكي (ولد ⬅️ بنت)</h2>
    <p>الكلام هيفضل بسرعته الطبيعية لكن النبرة هتتحول لصوت بنت</p>
    
    <div id="status" class="status">جاهز للتسجيل...</div>
    
    <button id="startBtn">🎤 ابدأ التسجيل</button>
    <button id="stopBtn" disabled>⏹️ إيقاف ومعالجة الصوت</button>
    
    <audio id="audioPlayback" controls></audio>
</div>

<script>
    let mediaRecorder;
    let audioChunks = [];

    const startBtn = document.getElementById("startBtn");
    const stopBtn = document.getElementById("stopBtn");
    const statusDiv = document.getElementById("status");
    const audioPlayback = document.getElementById("audioPlayback");

    startBtn.onclick = async () => {
        audioChunks = [];
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            
            mediaRecorder.onstop = async () => {
                statusDiv.textContent = "جاري تعديل خامة ونبرة الصوت بالذكاء الاصطناعي...";
                const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                await processVoice(audioBlob);
            };

            mediaRecorder.start();
            startBtn.disabled = true;
            stopBtn.disabled = false;
            statusDiv.textContent = "🔴 جاري التسجيل الآن... تكلم بطبيعتك";
        } catch (err) {
            statusDiv.textContent = "يرجى السماح بصلاحية المايك لتجربة التطبيق";
        }
    };

    stopBtn.onclick = () => {
        mediaRecorder.stop();
        startBtn.disabled = false;
        stopBtn.disabled = true;
    };

    async function processVoice(blob) {
        const arrayBuffer = await blob.arrayBuffer();
        
        // تحويل الملف لـ AudioBuffer مخصص للمكتبة
        const toneBuffer = new Tone.ToneAudioBuffer();
        await toneBuffer.load(URL.createObjectURL(blob));

        // إنشاء مشغل الصوت
        const player = new Tone.Player(toneBuffer);

        // أهم خطوة: فلتر الـ Pitch Shift لرفع حدة الصوت بدون تسريع
        // الرقم 6 أو 7 مثالي لرفع صوت الرجل لطبقة صوت فتاة ناعمة وطبيعية
        const pitchShift = new Tone.PitchShift({
            pitch: 6.5 
        });

        // توصيل الفلتر بالخارج لتسجيل النتيجة
        const actx = Tone.getContext().rawContext;
        const dest = actx.createMediaStreamDestination();
        
        Tone.connect(player, pitchShift);
        pitchShift.connect(dest);

        // تسجيل الصوت المعدل الجديد
        const recorder = new MediaRecorder(dest.stream);
        const chunks = [];
        recorder.ondataavailable = e => chunks.push(e.data);
        
        recorder.onstop = () => {
            const convertedBlob = new Blob(chunks, { type: 'audio/wav' });
            audioPlayback.src = URL.createObjectURL(convertedBlob);
            statusDiv.textContent = "✅ جاهز! اسمع صوت البنت الآن بدون تسريع للكلام";
        };

        recorder.start();
        player.start();
        
        // إيقاف التسجيل فور انتهاء الريكورد
        setTimeout(() => {
            recorder.stop();
            player.stop();
        }, toneBuffer.duration * 1000 + 200);
    }
</script>

</body>
</html>
